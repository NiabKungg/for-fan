<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ถึงเธอ</title>
<style>
:root {
  --bg: #0a0a0c;
  --surface: #141418;
  --gold: #d4a853;
  --rose: #e8a0bf;
  --text: #c8c8d0;
  --muted: #6a6a76;
  --green: #26a69a;
  --red: #ef5350;
  --radius: 8px;
  --font-mono: 'Courier New', Courier, monospace;
  --font-serif: Georgia, 'Times New Roman', serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-serif);
  overflow-x: hidden;
}

/* ===== PASSWORD GATE ===== */
#password-gate {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
#password-gate.unlocked {
  transform: translateY(-100%);
}
#password-gate h2 {
  color: var(--gold);
  font-family: var(--font-mono);
  font-size: 1.2rem;
  letter-spacing: 0.2em;
  margin-bottom: 1.5rem;
  text-transform: uppercase;
}
#password-gate .pw-input-wrapper {
  position: relative;
}
#password-gate input {
  background: transparent;
  border: 1px solid var(--muted);
  color: var(--gold);
  font-family: var(--font-mono);
  font-size: 1.5rem;
  letter-spacing: 0.3em;
  text-align: center;
  padding: 0.6rem 1rem;
  width: 200px;
  border-radius: var(--radius);
  outline: none;
  transition: border-color 0.3s;
}
#password-gate input:focus {
  border-color: var(--gold);
}
#password-gate .pw-error {
  color: var(--rose);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  margin-top: 0.75rem;
  min-height: 1.2em;
  opacity: 0;
  transition: opacity 0.3s;
}
#password-gate .pw-error.show { opacity: 1; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
.shake { animation: shake 0.5s ease; }

/* ===== MAIN CONTENT ===== */
#main-content {
  opacity: 0;
  transition: opacity 0.8s ease 0.4s;
}
#main-content.visible { opacity: 1; }

/* ===== HERO ===== */
#hero {
  min-height: 70vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4rem 1.5rem;
  position: relative;
  overflow: hidden;
}
#hero::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 600px; height: 600px;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(212,168,83,0.06) 0%, transparent 70%);
  pointer-events: none;
}
#hero .hero-title {
  font-size: clamp(2.5rem, 8vw, 5rem);
  color: var(--gold);
  font-family: var(--font-serif);
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 0.8s ease forwards;
}
#hero .hero-sub {
  font-size: clamp(1rem, 3vw, 1.4rem);
  color: var(--rose);
  margin-top: 1rem;
  max-width: 500px;
  line-height: 1.7;
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 0.8s ease 0.2s forwards;
}
#hero .hero-date {
  font-family: var(--font-mono);
  color: var(--muted);
  font-size: 0.9rem;
  margin-top: 2rem;
  letter-spacing: 0.15em;
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 0.8s ease 0.4s forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

/* ===== MESSAGES ===== */
#messages-section {
  padding: 4rem 1.5rem;
  text-align: center;
  max-width: 600px;
  margin: 0 auto;
}
#messages-section .section-title {
  font-size: 1.6rem;
  color: var(--gold);
  margin-bottom: 2rem;
}
#messages-section .message-card {
  background: var(--surface);
  border: 1px solid #1e1e26;
  border-radius: var(--radius);
  padding: 2.5rem 1.5rem;
  min-height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.15rem;
  line-height: 1.8;
  color: var(--text);
  transition: opacity 0.25s ease;
  position: relative;
  overflow: hidden;
}
#messages-section .message-card::before {
  content: '"';
  position: absolute;
  top: 10px; left: 20px;
  font-size: 4rem;
  color: var(--gold);
  opacity: 0.15;
  font-family: var(--font-serif);
  line-height: 1;
}
#messages-section .message-card.fading { opacity: 0; }
#messages-section .msg-btn {
  margin-top: 1.5rem;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  padding: 0.6rem 1.5rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
}
#messages-section .msg-btn:hover {
  background: var(--gold);
  color: var(--bg);
}

/* ===== MUSIC PLAYER ===== */
#music-toggle {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 900;
  width: 3rem;
  height: 3rem;
  border-radius: 50%;
  background: var(--surface);
  border: 2px solid #1e1e26;
  color: var(--text);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.3s, transform 0.2s;
}
#music-toggle:hover,
#music-toggle.playing {
  border-color: var(--gold);
}
#music-toggle:active { transform: scale(0.95); }

/* ===== PARTICLES ===== */
#particles-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
}

@keyframes float-up {
  0% {
    opacity: 1;
    transform: translateY(0) scale(1) rotate(0deg);
  }
  100% {
    opacity: 0;
    transform: translateY(-200px) scale(0.3) rotate(var(--rot, 20deg));
  }
}

@keyframes float-up-far {
  0% {
    opacity: 0.8;
    transform: translateY(0) scale(1) rotate(0deg);
  }
  100% {
    opacity: 0;
    transform: translateY(-110vh) scale(0.3) rotate(var(--rot, 20deg));
  }
}

.particle {
  position: absolute;
  animation: float-up var(--dur, 2s) ease-out forwards;
  font-size: var(--size, 1.5rem);
  user-select: none;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  #hero { min-height: 60vh; padding: 3rem 1rem; }
  #chart-section { padding: 2rem 0.5rem 3rem; }
  #messages-section { padding: 3rem 1rem; }
  #messages-section .message-card {
    padding: 1.8rem 1rem;
    font-size: 1rem;
  }
  #messages-section .section-title { font-size: 1.3rem; }
}

#attribution {
  text-align: center;
  padding: 1.5rem;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  opacity: 0;
  animation: fadeUp 0.8s ease 1.6s forwards;
}
</style>
</head>
<body>

<div id="password-gate">
  <h2>Enter Password</h2>
  <div class="pw-input-wrapper">
    <input type="password" id="pw-input" maxlength="6" placeholder="______" autofocus>
  </div>
  <div class="pw-error" id="pw-error"></div>
</div>

<div id="main-content">

  <section id="hero">
    <h1 class="hero-title">ถึงเธอ</h1>
    <p class="hero-sub">ทุกวินาทีที่มีเธอคือที่สุดในหัวใจ</p>
    <p class="hero-date">07.07.25 — ∞</p>
  </section>

  <section id="messages-section">
    <h2 class="section-title">💌 ข้อความจากใจ</h2>
    <div class="message-card" id="message-card"></div>
    <button class="msg-btn" id="msg-btn">กดเพื่ออ่านข้อความอื่น ✨</button>
  </section>

  <p id="attribution">made with 💗 for fan</p>

</div>

<div id="particles-container"></div>

<audio id="bg-music" src="fellow fellow Proud OFFICIAL MV.mp3" loop preload="auto"></audio>
<button id="music-toggle" title="เล่นเพลง">🎵</button>

<script>
(function() {

/* ===== PASSWORD GATE ===== */
var pwGate = document.getElementById('password-gate');
var pwInput = document.getElementById('pw-input');
var pwError = document.getElementById('pw-error');
var mainContent = document.getElementById('main-content');

pwInput.addEventListener('input', function() {
  var val = pwInput.value;
  if (val.length === 6) {
    if (val === '070725') {
      pwError.classList.remove('show');
      pwGate.classList.add('unlocked');
      mainContent.classList.add('visible');
      bgMusic.play().catch(function() {});
    } else {
      pwInput.classList.add('shake');
      pwError.textContent = 'ยังไม่ใช่รหัสที่ถูกต้องนะ... 💔';
      pwError.classList.add('show');
      setTimeout(function() {
        pwInput.value = '';
        pwInput.classList.remove('shake');
        pwInput.focus();
      }, 500);
    }
  } else {
    pwError.classList.remove('show');
  }
});

/* ===== MESSAGE RANDOMIZER ===== */
var messages = [
  'ขอบคุณที่อยู่ด้วยกัน และรักกันเสมอมา รักตลอดไป จุ๊บๆ',
  'รอยยิ้มของเธอทำให้ทั้งวันสดใส',
  'ขอบคุณที่อยู่ด้วยกันนะ',
  'รักที่สุดเลย'
];
var lastMsgIndex = -1;
var msgCard = document.getElementById('message-card');
var msgBtn = document.getElementById('msg-btn');

function showRandomMessage() {
  var idx;
  do {
    idx = Math.floor(Math.random() * messages.length);
  } while (idx === lastMsgIndex && messages.length > 1);
  lastMsgIndex = idx;
  msgCard.classList.add('fading');
  setTimeout(function() {
    msgCard.textContent = messages[idx];
    msgCard.classList.remove('fading');
  }, 250);
}

msgBtn.addEventListener('click', showRandomMessage);
showRandomMessage();

/* ===== HEART PARTICLE ANIMATION ===== */
var particlesContainer = document.getElementById('particles-container');
var heartEmojis = ['💕','💗','💖','💘','💝','❤️','💛','✨'];

document.addEventListener('click', function(e) {
  var count = Math.floor(Math.random() * 10) + 8;
  for (var i = 0; i < count; i++) {
    var particle = document.createElement('span');
    particle.className = 'particle';
    particle.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];

    var size = (Math.random() * 2 + 1).toFixed(2);
    var dur = (Math.random() * 2 + 1.5).toFixed(2);
    var rot = (Math.random() * 60 - 30).toFixed(0);

    particle.style.cssText = [
      'left:' + (e.clientX + (Math.random() * 40 - 20)) + 'px',
      'top:' + (e.clientY + (Math.random() * 10 - 5)) + 'px',
      '--size:' + size + 'rem',
      '--dur:' + dur + 's',
      '--rot:' + rot + 'deg'
    ].join(';');

    particlesContainer.appendChild(particle);

    setTimeout(function() {
      if (particle.parentNode) particle.parentNode.removeChild(particle);
    }, parseFloat(dur) * 1000 + 200);
  }
});

/* floating ambient hearts */
function spawnAmbientHeart() {
  var heart = document.createElement('span');
  heart.className = 'particle';
  heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
  heart.style.animationName = 'float-up-far';
  heart.style.cssText = [
    'left:' + (Math.random() * window.innerWidth) + 'px',
    'top:' + (window.innerHeight + 20) + 'px',
    '--size:' + (Math.random() * 1.5 + 0.8).toFixed(2) + 'rem',
    '--dur:' + (Math.random() * 6 + 4).toFixed(2) + 's',
    '--rot:' + (Math.random() * 40 - 20).toFixed(0) + 'deg',
    'animation-name: float-up-far'
  ].join(';');
  particlesContainer.appendChild(heart);
  setTimeout(function() {
    if (heart.parentNode) heart.parentNode.removeChild(heart);
  }, 11000);
}
setInterval(spawnAmbientHeart, 800);

/* ===== MUSIC PLAYER ===== */
var bgMusic = document.getElementById('bg-music');
var musicToggle = document.getElementById('music-toggle');
var isPlaying = false;

musicToggle.addEventListener('click', function() {
  if (isPlaying) {
    bgMusic.pause();
    musicToggle.textContent = '🎵';
    musicToggle.classList.remove('playing');
  } else {
    bgMusic.play().catch(function() {});
    musicToggle.textContent = '🎶';
    musicToggle.classList.add('playing');
  }
  isPlaying = !isPlaying;
});

})();
</script>
</body>
</html>
